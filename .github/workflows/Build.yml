name: Build ESP32 Firmware

on:
  push:
    branches: [ main ]
    tags: ['v*.*.*']    # build juga saat tag versi dibuat, mis. v1.2.3
  pull_request:
    branches: [ main ]
  workflow_dispatch:     # manual trigger dari UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESP-IDF (Espressif installer action)
        uses: espressif/install-esp-idf-action@v1
        with:
          esp-idf-version: 'release/v4.4'    # sesuaikan dengan versi projectmu

      - name: Show IDF info (debug)
        run: |
          echo "ESP-IDF: $IDF_PATH"
          source $IDF_PATH/export.sh
          idf.py --version

      - name: Build firmware
        env:
          IDF_PATH: ${{ env.IDF_PATH }}
        run: |
          # jika project ada di subfolder, ubah 'myproject' menjadi path yang benar:
          # cd myproject
          source $IDF_PATH/export.sh
          idf.py fullclean || true
          idf.py -B build build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            build/*.bin
            build/*.elf
            build/partitions.bin
            build/bootloader.bin
