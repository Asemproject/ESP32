name: Build ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESP-IDF tools
        run: |
          sudo apt update
          sudo apt install -y git wget flex bison gperf python3-pip cmake ninja-build ccache libffi-dev libssl-dev dfu-util
          git clone --depth=1 https://github.com/espressif/esp-idf.git $HOME/esp-idf
          $HOME/esp-idf/install.sh esp32

      - name: Build firmware
        run: |
          source $HOME/esp-idf/export.sh
          idf.py build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/*.bin
